---
layout: default
title: Karar İncelemeleri
---
<div style="padding: 2rem 0 1rem;">
  <h1 style="font-family: var(--serif); font-size: 24px; font-weight: 500; color: var(--text); margin-bottom: 0.25rem;">Karar İncelemeleri</h1>
  <p style="font-family: var(--sans); font-size: 13px; color: var(--subtle);">Danıştay ve AİHM kararları üzerine incelemeler</p>
</div>
<ul class="post-list">
  {% for karar in site.kararlar %}
  <li class="post-item">
    <div>
      <div class="post-tag">{{ karar.mahkeme }}</div>
      <div class="post-title"><a href="{{ karar.url | relative_url }}">{{ karar.title }}</a></div>
    </div>
    <div class="post-date">{{ karar.date | date: "%-d %b %Y" }}</div>
  </li>
  {% endfor %}
</ul>
